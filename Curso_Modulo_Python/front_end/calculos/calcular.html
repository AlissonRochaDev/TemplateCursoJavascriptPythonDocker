<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculos</title>
</head>
<body style="font-family: Tahoma;">
    <h2>Calcular:</h2>
    <div>
        <p>
            <label>Digite o 1º Número:</label>
            <input type="text" id="num1" placeholder="Digite aqui...">
        </p>
        <p>
            <label>Digite o 2º Número:</label>
            <input type="text" id="num2" placeholder="Digite aqui...">
        </p>
        <p>
            <label>Escolha sua Operação Matemática:</label>
            <select id="operador">
                <option value="">Selecione</option>
                <option value="+">Somar</option>
                <option value="-">Subtrair</option>
                <option value="X">Multiplicar</option>
                <option value="/">Dividir</option>
            </select>
        </p>
        <p>
            <button type="submit" id="btn_calcular" onclick="calcular()">Calcular</button>
        </p>
    </div>
    <br>
    <div>
        <strong>Resultado Final:</strong>
        <input disabled id="resultado">
    </div>

    <!-- Sessão Javascript no HTML! -->
    <script>
        // Executando e Consumindo uma API (Simulação).
        async function calcular() {
            try{
                const numero1 = document.getElementById("num1").value
                const numero2 = document.getElementById("num2").value
                const operador = document.getElementById("operador").value

                if(numero1 == "" || numero2 == "" || operador == ""){
                    alert("Preencher todos os campos OBRIGATÓRIOS!")
                }else{
                    // Objeto de Dados!
                    const enviarDados = {
                        "n1": numero1,
                        "n2": numero2,
                        "op": operador
                    }

                    const dadosJSON = JSON.stringify(enviarDados)

                    const response = await fetch("/respostas-calculadora", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: dadosJSON
                    })

                    if(!response.ok){
                        alert("Ocorreu um ERRO na chamada da API!")
                    }else{
                        const dadosRetornados = await response.json()
                        document.getElementById("resultado").value = dadosRetornados.Resultado
                    }
                }
            }catch{
                alert("Ocorreu um ERRO GERAL!")
            }
        }
    </script>
</body>
</html>
