<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Campos e Dados de Formulários</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>1º Exemplo - Validar Campos e Dados de Formulários.</h2>
        
        <div class="form-group">
            <label for="nome_usuario">Digite seu Nome Completo:</label>
            <input type="text" id="nome_usuario" placeholder="Digite aqui...">
        </div>
        
        <div class="form-group">
            <label for="email_usuario">Digite seu E-mail:</label>
            <input type="email" id="email_usuario" placeholder="Digite aqui...">
        </div>
        
        <div class="form-group">
            <label for="idade_usuario">Digite sua Idade:</label>
            <input type="text" id="idade_usuario" placeholder="Digite aqui...">
        </div>

        <button type="submit" class="btn success" id="btn_validar">Validar Formulário</button>
    </main>

    <script>

        // 2 == 2 - True
        // 2 == '2' - True
        // 2 === 2 - True
        // 2 === '2' - False

        const btnValidarForm = document.getElementById("btn_validar")

        btnValidarForm.addEventListener("click", () => {
            // Variáveis para capturar o CAMPO DE DADOS!
            const campo_nome = document.getElementById("nome_usuario")
            const campo_email = document.getElementById("email_usuario")
            const campo_idade = document.getElementById("idade_usuario")

            // Variáveis para receber os DADOS digitados nos Inputs!
            const nome_usuario = campo_nome.value.trim()
            const email_usuario = campo_email.value.trim()
            const idade_usuario = campo_idade.value.trim()

            if(nome_usuario === ""){
                alert("Preencher o campo obrigatórioa NOME!")
                campo_nome.value = ""
                campo_nome.focus()
            }else if(email_usuario === ""){
                alert("Preencher o campo obrigatórioa E-MAIL!")
                campo_email.value = ""
                campo_email.focus()
            }else if(idade_usuario === ""){
                alert("Preencher o campo obrigatórioa IDADE!")
                campo_idade.value = ""
                campo_idade.focus()
            }else if(isNaN(idade_usuario)){
                alert("Digite apenas caracteres NUMÉRICOS!")
                campo_idade.value = ""
                campo_idade.focus()
            }else{
                alert("Campos Validados com SUCESSO!")
                campo_nome.value = ""
                campo_email.value = ""
                campo_idade.value = ""
                campo_nome.focus()
            }
        })

    </script>

</body>
</html>
