<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2º Exemplo - Captura de Informações Digitadas</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>1º Exemplo: Captura de Informações Digitadas.</h2>

        <div class="form-group">
            <label for="nome_usuario">Digite seu Nome Completo:</label>
            <input type="text" id="nome_usuario" placeholder="Digite aqui...">
        </div>

        <div class="form-group">
            <label for="email_usuario">Digite seu E-mail:</label>
            <input type="email" id="email_usuario" placeholder="Digite aqui...">
        </div>

        <button type="submit" class="btn success" id="btn-mostrar"onclick="MostrarDadosDigitados()">Mostrar</button>

        <p id="msg_exibir"></p>
    </main>

    <script>

        // Captura e identificação do elemento na página HTML (Botão)!
        const btn_mostrar = document.getElementById("btn-mostrar")
        const msg = document.getElementById("msg_exibir")

        // Function restrita (privada) Javascript para execução de uma tarefa do Botão!
        btn_mostrar.addEventListener("click", MostrarDadosDigitados)

        async function processarDados() {
            msg.innerHTML += "Processando os dados digitados...<br>"

            return new Promise((resolve) => {
                // Simula processamento demorado!
                setTimeout(() => {
                    msg.innerHTML += "Dados processados com sucesso!<br>"

                    resolve()
                }, 2000)
            })
        }

        async function iniciarProcesso() {
            msg.innerHTML += "Iniciando captura das informações.<br>"
            await processarDados()
            msg.innerHTML += "Processo finalizado.<br>"
        }

        async function MostrarDadosDigitados() {
            const nome_completo = document.querySelector("#nome_usuario").value
            const email_usuario = document.querySelector("#email_usuario").value

            msg.innerHTML = "Capturando os dados do usuário.<br>"
            await iniciarProcesso()
            alert("Nome Completo: " + nome_completo + "\nE-mail do Usuário: " + email_usuario)
        }

    </script>

</body>

</html>
