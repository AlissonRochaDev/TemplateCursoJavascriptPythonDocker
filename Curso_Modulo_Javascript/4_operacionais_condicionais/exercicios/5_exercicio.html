<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5º Exercício</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
</head>

<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Conversor de Temperatura.</h2>

        <div class="form-group">
            <label for="temperatura">Digite a Temperatura:</label>
            <input type="text" id="temperatura" placeholder="Digite aqui...">
        </div>

        <div class="form-group">
            <label for="opcao_conversao">Selecione a Conversão:</label>
            <select id="opcao_conversao">
                <option value="">Selecione</option>
                <option value="CF">CF</option>
                <option value="FC">FC</option>
            </select>
        </div>

        <button type="submit" class="btn success" id="btn_converter">Converter</button>

        <p id="resultadoTemp"></p>
    </main>

    <script>

        const btnConverter = document.getElementById("btn_converter")
        const resultadoTemp = document.getElementById("resultadoTemp")

        btnConverter.addEventListener("click", () => {
            const campoTemperatura = document.getElementById("temperatura")
            const campoOpcao = document.getElementById("opcao_conversao")

            const temperatura = campoTemperatura.value.trim()
            const opcao = campoOpcao.value.trim()

            if (temperatura == "") {
                alert("Preencher o campo TEMPERATURA")
                campoTemperatura.value = ""
                campoTemperatura.focus()
            } else if (isNaN(temperatura)) {
                alert("Preencher a TEMPERATURA com SOMENTE NÚMEROS")
                campoTemperatura.value = ""
                campoTemperatura.focus()
            } else if (opcao == "") {
                alert("Selecionar uma OPÇÃO de conversão")
                campoOpcao.focus()
            } else {
                let resultado

                if (opcao == "CF") {

                    resultado = (Number(temperatura) * 9/5) + 32
                    resultadoTemp.innerHTML = `Resultado: ${resultado.toFixed(2)} °F`

                    if (resultado >= 86) {
                        resultadoTemp.style.color = "red"
                    } else if (resultado <= 50) {
                        resultadoTemp.style.color = "blue"
                    } else {
                        resultadoTemp.style.color = "green"
                    }
                } else if (opcao == "FC") {

                    resultado = (Number(temperatura) - 32) * 5/9
                    resultadoTemp.innerHTML = `Resultado: ${resultado.toFixed(2)} °C`

                    if (resultado >= 30) {
                        resultadoTemp.style.color = "red"
                    } else if (resultado <= 10) {
                        resultadoTemp.style.color = "blue"
                    } else {
                        resultadoTemp.style.color = "green"
                    }
                }
            }
        })

    </script>

</body>
</html>
