<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Conteúdo na Página HTML</title>
    <link rel="stylesheet" type="text/css" href="../style.css">
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>3º Exemplo - Alterar Conteúdo na Página HTML!</h2>
        <div class="form-group">
            <label for="nome_completo">Nome Completo:</label>
            <input type="text" id="nome_completo" placeholder="Digite aqui...">
        </div>
        <button type="submit" class="btn success" id="btn_mostrar_boas_vindas">Mostrar Seja Bem Vindo</button>

        <p id="msg"></p>
        <hr>
        <p id="titulo_alterar">Olá! Selecione uma configuração para modificar o estilo desse texto.</p>

        <div class="form-group">
            <label for="example3">Selecione a COR do texto:</label>
            <select id="opcao_cor_texto">
                <option value="">Selecione</option>
                <option value="blue">Azul</option>
                <option value="red">Vermelho</option>
                <option value="orange">Laranja</option>
            </select>
        </div>
        <div class="form-group">
            <label for="example3">Selecione o TAMANHO do texto:</label>
            <select id="opcao_tamanho_texto">
                <option value="">Selecione</option>
                <option value="12">12</option>
                <option value="14">14</option>
                <option value="16">16</option>
            </select>
        </div>   
        <button type="submit" id="btn_formatar_estilo" class="btn success">Formatar</button>

        <hr>

        <button type="submit" id="btn_pessoa_fisica" class="btn success">Mostrar Pessoa Física</button>
        <button type="submit" id="btn_pessoa_juridica" class="btn success">Mostrar Pessoa Jurídica</button>

        <div class="form-group" id="cpf" style="display: none;">
            <label for="cpf">Digite seu CPF:</label>
            <input type="text" id="cpf" placeholder="Digite aqui...">
        </div>
        <div class="form-group" id="cnpj" style="display: none;">
            <label for="cnpj">Digite seu CNPJ:</label>
            <input type="text" id="cnpj" placeholder="Digite aqui...">
        </div>        
        
    </main>

    <script>
        
        const btnMostrar = document.getElementById("btn_mostrar_boas_vindas")
        const msgMostrar = document.getElementById("msg")

        const btnFormatarEstilo = document.getElementById("btn_formatar_estilo")
        const tituloAlterar = document.getElementById("titulo_alterar")

        const btnMostrarCPF = document.getElementById("btn_pessoa_fisica")
        const btnMostrarCNPJ = document.getElementById("btn_pessoa_juridica")

        const divCNPJ = document.getElementById("cnpj")
        const divCPF = document.getElementById("cpf")

        btnMostrarCPF.addEventListener("click", () => {
            divCPF.style.display = "block"
            divCNPJ.style.display = "none"
        })

        btnMostrarCNPJ.addEventListener("click", () => {
            divCNPJ.style.display = "block"
            divCPF.style.display = "none"
        })        

        btnMostrar.addEventListener("click", () => {
            const nome = document.getElementById("nome_completo").value
            msgMostrar.innerHTML = `Seja Bem-Vindo: ${nome}`
        })

        btnFormatarEstilo.addEventListener("click", () => {
            const cor = document.getElementById("opcao_cor_texto").value
            const tamanho = document.getElementById("opcao_tamanho_texto").value

            tituloAlterar.style.color = cor
            tituloAlterar.style.fontSize = tamanho + 'px'
        })

    </script>
</body>
</html>
