<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Dobro da Soma</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
</head>

<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Trabalhando com Calculos.</h2>

        <div class="form-group">
            <label for="numero1">Número 1:</label>
            <input type="text" id="numero1" placeholder="Digite aqui...">
        </div>

        <div class="form-group">
            <label for="numero2">Número 2:</label>
            <input type="text" id="numero2" placeholder="Digite aqui...">
        </div>

        <div class="form-group">
            <label for="numero3">Número 3:</label>
            <input type="text" id="numero3" placeholder="Digite aqui...">
        </div>

        <div class="form-group">
            <label for="numero4">Número 4:</label>
            <input type="text" id="numero4" placeholder="Digite aqui...">
        </div>

        <button type="button" class="btn success" id="btn_calcular">
            Calcular Dobro da Soma
        </button>
    </main>

    <script>

        const btnCalcular = document.getElementById("btn_calcular")

        btnCalcular.addEventListener("click", CalcularDobroDaSoma)

        function CalcularDobroDaSoma(){
            const n1 = Number(document.querySelector("#numero1").value)
            const n2 = Number(document.querySelector("#numero2").value)
            const n3 = Number(document.querySelector("#numero3").value)
            const n4 = Number(document.querySelector("#numero4").value)

            const soma = n1 + n2 + n3 + n4
            const dobro = soma * 2

            alert(
                "Soma dos valores: " + soma +
                "\nDobro da soma: " + dobro
            )
        }

    </script>

</body>
</html>
