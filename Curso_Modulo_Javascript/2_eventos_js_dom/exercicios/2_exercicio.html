<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2º Exercício</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
</head>

<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Trabalhando com Calculos.</h2>

        <div class="form-group">
            <label for="nome_produto">Nome do Produto:</label>
            <input type="text" id="nome_produto" placeholder="Digite aqui...">
        </div>
        <div class="form-group">
            <label for="custo">Preço (R$):</label>
            <input type="text" id="custo" placeholder="Digite aqui...">
        </div>
        <div class="form-group">
            <label for="qtd_estoque">Qtd. em Estoque:</label>
            <input type="text" id="qtd_estoque" placeholder="Digite aqui...">
        </div>        
        
        <button type="submit" class="btn success" id="btn_mostrar" onclick="MostrarProduto()">Mostrar</button>
    </main>

    <script>

        const btnMostrar = document.getElementById("#btn_mostrar")

        btnMostrar.addEventListener("click", MostrarProduto)

        function MostrarProduto(){
            const nomeProduto = document.querySelector("#nome_produto").value
            const custo = document.querySelector("#custo").value
            const qtdEstoque = document.querySelector("#qtd_estoque").value

            alert("Nome do Produto: " + nomeProduto + ".\nPreço: " + custo + ".\nQtd. em Estoque: " + qtdEstoque)
        }

    </script>
</body>
</html>
