<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Exercício</title>
    <link rel="stylesheet" type="text/css" href="../../style.css">
</head>

<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Manipulando Dados.</h2>

        <div class="form-group">
            <label for="nome_cidade">Nome da Cidade:</label>
            <input type="text" id="nome_cidade" placeholder="Digite aqui...">
        </div>
        <div class="form-group">
            <label for="nome_estado">Nome do Estado:</label>
            <input type="text" id="nome_estado" placeholder="Digite aqui...">
        </div>
        <div class="form-group">
            <label for="qtd_habitantes">Qtd. de Habitantes:</label>
            <input type="text" id="qtd_habitantes" placeholder="Digite aqui...">
        </div>        
        
        <button type="submit" class="btn success" id="btn_mostrar" onclick="MostrarCidade()">Mostrar</button>
    </main>

    <script>

        const btnMostrar = document.getElementById("#btn_mostrar")

        btnMostrar.addEventListener("click", MostrarCidade)

        function MostrarCidade(){
            const nomeCidade = document.querySelector("#nome_cidade").value
            const nomeEstado = document.querySelector("#nome_estado").value
            const qtdHabitantes = document.querySelector("#qtd_habitantes").value

            alert("Nome da Cidade: " + nomeCidade + ".\nEstado: " + nomeEstado + ".\nQtd. de Habitantes: " + qtdHabitantes)
        }

    </script>
</body>
</html>
