<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>5ª Exercício</title>
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Trabalhando com (alert) do Javascript e concatenando Variáveis, Substituição de valores e Realizando Calculos.</h2>

        <div class="module-list">
            <button type="submit" class="btn success" onclick="somarValores()">Mostrar</button>
        </div>
    </main>

    <script>

      function somarValores(){
        let numero_1 = 10
        let numero_2 = 5

        let soma = (numero_1 + numero_2)

        alert("Soma de 10 + 5 = " + soma)

      }

    </script>
</body>
</html>
