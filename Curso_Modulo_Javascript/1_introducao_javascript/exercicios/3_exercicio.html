<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>3ª Exercício</title>
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Trabalhando com (alert) do Javascript e Variáveis e Substituição de Valores.</h2>

        <div class="module-list">
            <a href="" class="btn success">Mostrar a Mensagem por Javascript Nativo</a>
        </div>
    </main>

    <script>

       const nome_usuario = "João"
       let cidade_usuario = "Ibiporã"

       alert("O Usuário " + nome_usuario + " mora na cidade de " + cidade_usuario + ".")

       cidade_usuario = "Londrina"

       alert("O Usuário " + nome_usuario + " se mudou para a cidade de " + cidade_usuario + ".")

    </script>
</body>
</html>
