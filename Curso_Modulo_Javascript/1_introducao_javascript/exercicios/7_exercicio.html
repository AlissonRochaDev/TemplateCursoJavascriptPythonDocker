<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style.css">
    <title>7ª Exercício</title>
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>

    <main class="main-content">
        <h2>Trabalhando com (alert) do Javascript, concatenação de Variáveis e Eventos (onchange).</h2>

        <div class="form-group">
            <label for="exemplo_select">Selecione uma das Opções:</label>
            <select id="exemplo_select" onchange="selecionarValorComParametro(this.value)">
                <option value="">Selecione</option>
                <option value="Vermelhor - #ff0000">Vermelhor</option>
                <option value="Azul - #0000ff">Azul</option>
                <option value="Verde - #008000">Verde</option>
            </select>
        </div>
    </main>

    <script>

        function selecionarValorComParametro(cor_selecionada){
            alert("Você selecionou a COR: " + cor_selecionada)
        }

    </script>
</body>
</html>
