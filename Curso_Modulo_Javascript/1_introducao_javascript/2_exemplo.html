<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Variáveis em Javascript Nativo</title>
</head>
<body>
    <header class="header-main">
        <h1>Lógica de programação com Javascript Nativo</h1>
    </header>
    <main class="main-content">
        <h2>2º Exemplo - Executando Variáveis no Javascript Nativo.</h2>
        <div class="module-list">
            <a href="" class="btn success">Executar Javascript</a>
        </div>
    </main>
    <!-- Espaço para o desenvolvimento de Javascript no HTML! -->
    <script>
        // Exemplos de Variáveis.
        var exemplo_1
        let exemplo_2
        const exemplo_3 = ""

        const nome_usuario = "Alisson Rocha"
        const idade_usuario = 33
        let peso_usuario = 94

        alert(nome_usuario + " sem almoço, esta com " + peso_usuario + " kg.")
        // Soma o processo de substituir um valor de Variável!
        peso_usuario = peso_usuario + 3
        alert(nome_usuario + " depois do almoço, esta com " + peso_usuario + " kg.")
    </script>
</body>
